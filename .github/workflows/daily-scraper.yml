name: Daily ESPN Scraper

on:
  schedule:
    - cron: '0 10 * * *'   # 6 AM ET — captures overnight/morning finalized stats
    - cron: '0 5 * * *'    # 1 AM ET — captures late west coast games that finished ~midnight
  workflow_dispatch: # Allows you to click "Run Now" manually

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas supabase google-cloud-storage

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: python active-stats-pull.py
