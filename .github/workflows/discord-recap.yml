name: Discord Fantasy Recap

on:
  schedule:
    # Daily recap: runs at 11:30 PM ET (03:30 UTC next day)
    - cron: "30 3 * * *"
    # Weekly recap: runs Monday at 8:00 AM ET (12:00 UTC) — recaps the previous week
    - cron: "0 12 * * 1"

  # Allow manual triggers from the Actions tab (useful for testing)
  workflow_dispatch:
    inputs:
      mode:
        description: "Recap mode: 'daily' or 'weekly'"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  discord-recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install supabase anthropic requests

      - name: Determine recap mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "1" ]; then
            # It's Monday — but the 8 AM schedule only runs on Mon anyway.
            # The 11:30 PM schedule also runs Monday; skip weekly on that run
            # by checking which cron fired via the hour.
            HOUR=$(date +%H)
            if [ "$HOUR" = "12" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            else
              echo "mode=daily" >> $GITHUB_OUTPUT
            fi
          else
            echo "mode=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run Discord recap
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python discord-daily-recap.py ${{ steps.mode.outputs.mode }}
