name: Scrape ESPN Transactions

on:
  schedule:
    # Every 2 hours during baseball hours (noon–midnight ET = 16:00–04:00 UTC)
    - cron: "0 16,18,20,22,0,2,4 * * *"
  workflow_dispatch:

jobs:
  scrape-transactions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase requests

      - name: Scrape transactions
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          ESPN_S2:       ${{ secrets.ESPN_S2 }}
          ESPN_SWID:     ${{ secrets.ESPN_SWID }}
        run: python transaction-scraper.py
